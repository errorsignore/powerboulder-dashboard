<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0E1117;
            color: #E6EDF3;
            min-height: 100vh;
            padding: 20px;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #2D333B;
            color: #E6EDF3;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: #3D434B;
        }

        .header-section {
            background: #1C1F26;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .player-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid;
            object-fit: cover;
            background: #2D333B;
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .social-links {
            margin-bottom: 20px;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #E1306C, #C13584);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .social-link:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(225, 48, 108, 0.4);
        }

        .player-stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #2D333B;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #8B949E;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #58A6FF;
        }

        .section {
            background: #1C1F26;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        #performance-chart {
            width: 100%;
            height: 400px;
        }

        .date-filter {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .date-filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .date-filter-group label {
            font-size: 12px;
            color: #8B949E;
            text-transform: uppercase;
        }

        .date-filter-group input {
            padding: 8px 12px;
            background: #2D333B;
            border: 1px solid #3D434B;
            border-radius: 6px;
            color: #E6EDF3;
            font-size: 14px;
        }

        .opponent-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .opponent-selector label {
            font-size: 16px;
            color: #8B949E;
        }

        .opponent-selector select {
            padding: 10px 20px;
            background: #2D333B;
            border: 2px solid #3D434B;
            border-radius: 8px;
            color: #E6EDF3;
            font-size: 16px;
            cursor: pointer;
            min-width: 200px;
        }

        .opponent-selector select:hover {
            border-color: #58A6FF;
        }

        .h2h-stats {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        }

        .h2h-player {
            text-align: center;
        }

        .h2h-player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .h2h-player-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid;
            object-fit: cover;
            background: #2D333B;
            margin: 0 auto 10px;
        }

        .h2h-vs {
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
        }

        .h2h-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .h2h-table th {
            background: #2D333B;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #8B949E;
            border-bottom: 2px solid #1C1F26;
        }

        .h2h-table td {
            padding: 12px;
            border-bottom: 1px solid #2D333B;
        }

        .h2h-table tbody tr:hover {
            background: #2D333B;
        }

        .no-duel-message {
            text-align: center;
            padding: 40px;
            color: #8B949E;
            font-size: 18px;
        }

        .player-tasso { color: #DC143C; }
        .player-symeon { color: #0000FF; }
        .player-seiko { color: #888888; }
        .player-andre { color: #00FF00; }
        .player-richi { color: #FFD700; }
        .player-pedro { color: #FF1493; }
        .player-alex { color: #FFFFFF; }
        .player-koray { color: #800080; }
        .player-moritz { color: #FF8C00; }
        .player-furkan { color: #808080; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8B949E;
        }
    </style>
</head>
<body>
    <a href="elo_dashboard_final.html" class="back-button">← Back to Dashboard</a>

    <div class="header-section">
        <div class="header-content">
            <img id="player-avatar" class="player-avatar" src="" alt="Player">
            <div class="player-info">
                <div class="player-name" id="player-name">Loading...</div>
                <div class="social-links" id="social-links"></div>
                <div class="player-stats-summary" id="stats-summary"></div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📈 Performance Over Time</div>
        <div class="date-filter">
            <div class="date-filter-group">
                <label>From Date</label>
                <input type="date" id="filter-start-date">
            </div>
            <div class="date-filter-group">
                <label>To Date</label>
                <input type="date" id="filter-end-date">
            </div>
        </div>
        <div id="performance-chart"></div>
    </div>

    <div class="section">
        <div class="section-title">⚔️ Head to Head</div>
        <div class="opponent-selector">
            <label>Select Opponent:</label>
            <select id="opponent-select">
                <option value="">-- Choose a player --</option>
            </select>
        </div>
        <div id="h2h-content" class="loading">Select an opponent to view head-to-head stats</div>
    </div>

    <script>
        const PLAYER_COLORS = {
            "Tasso": "#DC143C", "Symeon": "#0000FF", "Seiko": "#000000",
            "Andre": "#00FF00", "Richi": "#FFD700", "Pedro": "#FF1493",
            "Alex": "#FFFFFF", "Koray": "#800080", "Moritz": "#FF8C00", "Furkan": "#808080"
        };

        // Social media handles (you can customize these)
        const SOCIAL_HANDLES = {
            "Alex": "mr_woodblock",
            "Tasso": "powerboulder",
            "Andre": "andrecontinanza",
            "Richi": "riichi_shi",
            "Seiko": "seikoboulder",
            "Moritz": "moritz_jarla",
            "Koray": "__koray1",
            "Pedro": "pedro_condessa11",
            "Symeon": "xekizoglou",
            "Furkan": "furkanmgin"
        };

        let videosData = [];
        let currentPlayer = "";
        let playerPerformance = [];

        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            currentPlayer = urlParams.get('player') || 'Alex';

            videosData = await loadVideosData();
            if (videosData.length === 0) return;

            setupHeader();
            calculatePlayerPerformance();
            setupDateFilters();
            updatePerformanceChart();
            setupOpponentSelector();
        }

        async function loadVideosData() {
            try {
                const response = await fetch('annotated_data.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Error loading videos data:', error);
                return [];
            }
        }

        function setupHeader() {
            const playerColor = PLAYER_COLORS[currentPlayer] || "#58A6FF";
            
            document.getElementById('player-name').textContent = currentPlayer;
            document.getElementById('player-name').style.color = playerColor;
            
            const avatar = document.getElementById('player-avatar');
            avatar.src = `faces/${currentPlayer}.png`;
            avatar.style.borderColor = playerColor;
            avatar.onerror = () => {
                avatar.style.backgroundColor = playerColor;
                avatar.style.opacity = '0.3';
            };

            const instagramHandle = SOCIAL_HANDLES[currentPlayer] || currentPlayer.toLowerCase();
            const socialLinks = document.getElementById('social-links');
            socialLinks.innerHTML = `
                <a href="https://instagram.com/${instagramHandle}" target="_blank" class="social-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                    </svg>
                    @${instagramHandle}
                </a>
            `;
        }

        function calculatePlayerPerformance() {
            playerPerformance = [];
            let cumulativeFlashes = 0;
            let cumulativeTops = 0;
            let cumulativeFails = 0;

            // Sort videos by date (ascending)
            const sortedVideos = [...videosData].sort((a, b) => 
                new Date(a.published_at) - new Date(b.published_at)
            );

            for (const video of sortedVideos) {
                let videoFlashes = 0;
                let videoTops = 0;
                let videoFails = 0;

                for (const boulder of video.boulders || []) {
                    const result = boulder.performances?.[currentPlayer];
                    if (result === "Flash") videoFlashes++;
                    else if (result === "Top") videoTops++;
                    else if (result === "Fail") videoFails++;
                }

                if (videoFlashes > 0 || videoTops > 0 || videoFails > 0) {
                    cumulativeFlashes += videoFlashes;
                    cumulativeTops += videoTops;
                    cumulativeFails += videoFails;

                    playerPerformance.push({
                        date: video.published_at.split('T')[0],
                        flashes: cumulativeFlashes,
                        tops: cumulativeTops,
                        fails: cumulativeFails,
                        video: video
                    });
                }
            }

            updateStatsSummary();
        }

        function updateStatsSummary() {
            const lastPerf = playerPerformance[playerPerformance.length - 1] || 
                { flashes: 0, tops: 0, fails: 0 };
            
            const totalAttempts = lastPerf.flashes + lastPerf.tops + lastPerf.fails;
            const successRate = totalAttempts > 0 ? 
                (((lastPerf.flashes + lastPerf.tops) / totalAttempts) * 100).toFixed(1) : 0;
            const flashRate = totalAttempts > 0 ? 
                ((lastPerf.flashes / totalAttempts) * 100).toFixed(1) : 0;

            const summaryDiv = document.getElementById('stats-summary');
            summaryDiv.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">Total Boulders</div>
                    <div class="stat-value">${totalAttempts}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Flashes</div>
                    <div class="stat-value" style="color: #FFD700;">${lastPerf.flashes}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Tops</div>
                    <div class="stat-value" style="color: #00FF00;">${lastPerf.tops}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Fails</div>
                    <div class="stat-value" style="color: #FF0000;">${lastPerf.fails}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Success Rate</div>
                    <div class="stat-value">${successRate}%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Flash Rate</div>
                    <div class="stat-value">${flashRate}%</div>
                </div>
            `;
        }

        function setupDateFilters() {
            if (playerPerformance.length === 0) return;

            const startDate = playerPerformance[0].date;
            const endDate = playerPerformance[playerPerformance.length - 1].date;

            document.getElementById('filter-start-date').value = startDate;
            document.getElementById('filter-end-date').value = endDate;
            document.getElementById('filter-start-date').max = endDate;
            document.getElementById('filter-end-date').max = endDate;
            document.getElementById('filter-start-date').min = startDate;
            document.getElementById('filter-end-date').min = startDate;

            document.getElementById('filter-start-date').addEventListener('change', updatePerformanceChart);
            document.getElementById('filter-end-date').addEventListener('change', updatePerformanceChart);
        }

        function updatePerformanceChart() {
            const startDateStr = document.getElementById('filter-start-date').value;
            const endDateStr = document.getElementById('filter-end-date').value;

            const filtered = playerPerformance.filter(p => 
                p.date >= startDateStr && p.date <= endDateStr
            );

            if (filtered.length === 0) return;

            const dates = filtered.map(p => p.date);
            const flashes = filtered.map(p => p.flashes);
            const tops = filtered.map(p => p.tops);
            const fails = filtered.map(p => p.fails);

            const data = [
                {
                    x: dates,
                    y: flashes,
                    name: 'Flashes',
                    type: 'scatter',
                    mode: 'lines+markers',
                    line: { color: '#FFD700', width: 3 },
                    marker: { size: 6 }
                },
                {
                    x: dates,
                    y: tops,
                    name: 'Tops',
                    type: 'scatter',
                    mode: 'lines+markers',
                    line: { color: '#00FF00', width: 3 },
                    marker: { size: 6 }
                },
                {
                    x: dates,
                    y: fails,
                    name: 'Fails',
                    type: 'scatter',
                    mode: 'lines+markers',
                    line: { color: '#FF0000', width: 3 },
                    marker: { size: 6 }
                }
            ];

            const layout = {
                paper_bgcolor: '#1C1F26',
                plot_bgcolor: '#1C1F26',
                font: { color: '#E6EDF3', family: 'Segoe UI' },
                xaxis: {
                    gridcolor: '#2D333B',
                    title: 'Date',
                    type: 'date'
                },
                yaxis: {
                    gridcolor: '#2D333B',
                    title: 'Cumulative Count'
                },
                legend: {
                    x: 0.01,
                    y: 0.99,
                    bgcolor: 'rgba(28, 31, 38, 0.8)'
                },
                hovermode: 'x unified'
            };

            const config = { responsive: true, displayModeBar: false };
            Plotly.newPlot('performance-chart', data, layout, config);
        }

        function setupOpponentSelector() {
            const allPlayers = new Set();
            
            for (const video of videosData) {
                for (const boulder of video.boulders || []) {
                    for (const player in boulder.performances || {}) {
                        if (player !== currentPlayer) {
                            allPlayers.add(player);
                        }
                    }
                }
            }

            const select = document.getElementById('opponent-select');
            const sortedPlayers = Array.from(allPlayers).sort();
            
            sortedPlayers.forEach(player => {
                const option = document.createElement('option');
                option.value = player;
                option.textContent = player;
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => {
                if (e.target.value) {
                    calculateHeadToHead(e.target.value);
                } else {
                    document.getElementById('h2h-content').innerHTML = 
                        '<div class="loading">Select an opponent to view head-to-head stats</div>';
                }
            });
        }

        function calculateHeadToHead(opponent) {
            const INITIAL_ELO = 1500;
            const K = 16;
            
            const elo = { [currentPlayer]: INITIAL_ELO, [opponent]: INITIAL_ELO };
            const stats = {
                [currentPlayer]: { flashes: 0, tops: 0, fails: 0, boulders: 0, eloChange: 0 },
                [opponent]: { flashes: 0, tops: 0, fails: 0, boulders: 0, eloChange: 0 }
            };

            let duelsFound = 0;

            for (const video of videosData) {
                for (const boulder of video.boulders || []) {
                    const performances = boulder.performances || {};
                    
                    // Check if both players participated
                    if (!(currentPlayer in performances) || !(opponent in performances)) {
                        continue;
                    }

                    duelsFound++;

                    // Update stats
                    for (const player of [currentPlayer, opponent]) {
                        const result = performances[player];
                        stats[player].boulders++;
                        if (result === "Flash") stats[player].flashes++;
                        else if (result === "Top") stats[player].tops++;
                        else if (result === "Fail") stats[player].fails++;
                    }

                    // Calculate ELO
                    const r1 = performances[currentPlayer];
                    const r2 = performances[opponent];
                    const s1 = r1 === "Flash" ? 2 : (r1 === "Top" ? 1 : 0);
                    const s2 = r2 === "Flash" ? 2 : (r2 === "Top" ? 1 : 0);

                    if (s1 !== s2) {
                        const S = s1 > s2 ? 1 : 0;
                        const E = 1 / (1 + Math.pow(10, (elo[opponent] - elo[currentPlayer]) / 400));
                        const delta = K * (S - E);
                        
                        elo[currentPlayer] += delta;
                        elo[opponent] -= delta;
                        stats[currentPlayer].eloChange += delta;
                        stats[opponent].eloChange -= delta;
                    }
                }
            }

            displayHeadToHead(opponent, stats, elo, duelsFound);
        }

        function displayHeadToHead(opponent, stats, elo, duelsFound) {
            const content = document.getElementById('h2h-content');

            if (duelsFound === 0) {
                content.innerHTML = `
                    <div class="no-duel-message">
                        ❌ No direct matchups found between ${currentPlayer} and ${opponent}
                    </div>
                `;
                return;
            }

            const playerColor = PLAYER_COLORS[currentPlayer] || "#58A6FF";
            const opponentColor = PLAYER_COLORS[opponent] || "#58A6FF";

            const p1Stats = stats[currentPlayer];
            const p2Stats = stats[opponent];

            const p1SuccessRate = p1Stats.boulders > 0 ? 
                (((p1Stats.flashes + p1Stats.tops) / p1Stats.boulders) * 100).toFixed(1) : 0;
            const p2SuccessRate = p2Stats.boulders > 0 ? 
                (((p2Stats.flashes + p2Stats.tops) / p2Stats.boulders) * 100).toFixed(1) : 0;

            content.innerHTML = `
                <div class="h2h-stats">
                    <div class="h2h-player">
                        <img src="faces/${currentPlayer}.png" class="h2h-player-img" 
                             style="border-color: ${playerColor};"
                             onerror="this.style.backgroundColor='${playerColor}'; this.style.opacity='0.3';">
                        <div class="h2h-player-name" style="color: ${playerColor};">${currentPlayer}</div>
                        <div style="font-size: 18px; color: #8B949E;">ELO: ${Math.round(elo[currentPlayer])}</div>
                    </div>
                    
                    <div class="h2h-vs">VS</div>
                    
                    <div class="h2h-player">
                        <img src="faces/${opponent}.png" class="h2h-player-img" 
                             style="border-color: ${opponentColor};"
                             onerror="this.style.backgroundColor='${opponentColor}'; this.style.opacity='0.3';">
                        <div class="h2h-player-name" style="color: ${opponentColor};">${opponent}</div>
                        <div style="font-size: 18px; color: #8B949E;">ELO: ${Math.round(elo[opponent])}</div>
                    </div>
                </div>

                <table class="h2h-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Boulders</th>
                            <th>Flashes</th>
                            <th>Tops</th>
                            <th>Fails</th>
                            <th>Success Rate</th>
                            <th>ELO Change</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="player-${currentPlayer.toLowerCase()}"><b>${currentPlayer}</b></td>
                            <td>${p1Stats.boulders}</td>
                            <td style="color: #FFD700;">${p1Stats.flashes}</td>
                            <td style="color: #00FF00;">${p1Stats.tops}</td>
                            <td style="color: #FF0000;">${p1Stats.fails}</td>
                            <td>${p1SuccessRate}%</td>
                            <td style="color: ${p1Stats.eloChange >= 0 ? '#00FF00' : '#FF0000'};">
                                ${p1Stats.eloChange >= 0 ? '+' : ''}${Math.round(p1Stats.eloChange)}
                            </td>
                        </tr>
                        <tr>
                            <td class="player-${opponent.toLowerCase()}"><b>${opponent}</b></td>
                            <td>${p2Stats.boulders}</td>
                            <td style="color: #FFD700;">${p2Stats.flashes}</td>
                            <td style="color: #00FF00;">${p2Stats.tops}</td>
                            <td style="color: #FF0000;">${p2Stats.fails}</td>
                            <td>${p2SuccessRate}%</td>
                            <td style="color: ${p2Stats.eloChange >= 0 ? '#00FF00' : '#FF0000'};">
                                ${p2Stats.eloChange >= 0 ? '+' : ''}${Math.round(p2Stats.eloChange)}
                            </td>
                        </tr>
                    </tbody>
                </table>
            `;
        }

        window.addEventListener('DOMContentLoaded', initProfile);
    </script>
</body>
